name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install clang-format
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 23
          sudo apt-get install -y clang-format-23

      - name: Check formatting
        run: ./scripts/check_clang_format.sh

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install clang-tidy
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 23
          sudo apt-get install -y clang-tidy-23 libc++-23-dev libc++abi-23-dev

      - name: Run clang-tidy
        run: ./scripts/check_clang_tidy.sh

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - cc: gcc-16
            cxx: g++-16
            install: gcc-16
          - cc: clang-23
            cxx: clang++-23
            install: clang-23

    steps:
      - uses: actions/checkout@v7

      - name: Install GCC 16
        if: matrix.install == 'gcc-16'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-16 g++-16

      - name: Install Clang 23
        if: matrix.install == 'clang-23'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 23
          sudo apt-get install -y libc++-23-dev libc++abi-23-dev

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.install }}
          repository-cache: true
          bazelisk-version: 1.x

      - name: Build and test
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          extra_flags=()
          if [ "${CC}" = "clang-23" ]; then
            extra_flags+=(--cxxopt=-stdlib=libc++)
            extra_flags+=(--linkopt=-stdlib=libc++)
            extra_flags+=(--linkopt=-lc++abi)
          fi
          bazel test //... \
            --action_env=CC \
            --action_env=CXX \
            "${extra_flags[@]}"
